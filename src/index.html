<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/design-tokens.css" />

  <style>
    body {
      opacity: 0;
    }

    body.kd-ready {
      opacity: 1;
      transition: opacity 0.25s ease;
    }
  </style>
  <script type="module">
    const pendingTags = [...new Set(
      Array.from(document.querySelectorAll(':not(:defined)'))
        .map((el) => el.tagName.toLowerCase())
    )];

    const whenAllDefined = Promise.allSettled(
      pendingTags.map((tag) => customElements.whenDefined(tag))
    );
    const timeout = new Promise((resolve) => setTimeout(resolve, 2000));

    await Promise.race([whenAllDefined, timeout]);
    document.body.classList.add('kd-ready');
  </script>

  <title>kids</title>
</head>

<body>
  <div id="app"></div>
  <kd-button appearance="solid">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-image"
      viewBox="0 0 16 16">
      <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0" />
      <path
        d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1z" />
    </svg>
  </kd-button>
  <kd-button appearance="outline">Render</kd-button>
  <kd-loader value="90"></kd-loader>
  </div>
</body>

</html>
